name: ci

on:
  pull_request: {}
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  check-commits:
    name: Check commit messages
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: aevea/commitsar@909c3ab676c9af63cb84f2e38f395c7e89829b04 # v1.0.3

  check-msrv:
    name: Check MSRV
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - run: cargo build -p jsonschema
      # Expand the validator macro at MSRV: generated code is not covered by a
      # lib-only build. A scratch crate keeps `jsonschema`'s dev-dependencies
      # (benchmark harnesses etc.) out of the resolution graph — they are free
      # to require a newer toolchain than the library itself.
      - run: |
          cargo new "$RUNNER_TEMP/msrv-macro-check" --lib --edition 2021
          cd "$RUNNER_TEMP/msrv-macro-check"
          # Make the manifest MSRV-aware before the first resolve: edition 2021 defaults
          # to resolver v2 (MSRV-unaware). Editing after `cargo add` would leave the
          # already-written lockfile pinned to toolchain-latest deps. Mirrors how a
          # downstream user pins their own MSRV.
          sed -i '/^edition = /a rust-version = "1.85.0"' Cargo.toml
          printf '\n[workspace]\nresolver = "3"\n' >> Cargo.toml
          cargo add jsonschema --path "$GITHUB_WORKSPACE/crates/jsonschema" --no-default-features --features macros
          cargo add serde_json
          cat > src/lib.rs <<'EOF'
          #[jsonschema::validator(
              schema = r#"{"type": "string", "minLength": 2, "format": "email", "pattern": "^[a-z]"}"#
          )]
          struct MsrvValidator;

          pub fn check(instance: &serde_json::Value) -> bool {
              MsrvValidator::is_valid(instance) && MsrvValidator::validate(instance).is_ok()
          }
          EOF
          cargo check

  test-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]

    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ${{ matrix.os }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: runner.os == 'Windows'

      - run: cargo test --no-fail-fast --all-features --workspace --exclude jsonschema-py --exclude jsonschema-rb

  test-cross:
    strategy:
      fail-fast: false
      matrix:
        target:
          - s390x-unknown-linux-gnu  # big-endian;

    name: Test on ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ${{ matrix.target }}

      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cross

      - name: Run tests on ${{ matrix.target }}
        env:
          CROSS_CONTAINER_OPTS: >-
            --env XDG_CACHE_HOME=/tmp/.cache
            --env XDG_DATA_HOME=/tmp/.local/share
        # Everything except `pyo3`: the cross image has no libpython to link test binaries against.
        run: cross test --target ${{ matrix.target }} --no-fail-fast --features conformance,resolve-http,resolve-file,resolve-async,tls-aws-lc-rs,tls-ring,arbitrary-precision,macros,reqwest -p jsonschema

  test-wasm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: wasm32-wasip1
            needs_wasmtime: true
            needs_wasm_bindgen: false
            features: "macros"
            display: wasm32-wasip1 (sync)
          - target: wasm32-wasip1
            needs_wasmtime: true
            needs_wasm_bindgen: false
            features: "resolve-async,macros"
            display: wasm32-wasip1 (async)
          - target: wasm32-unknown-unknown
            needs_wasmtime: false
            needs_wasm_bindgen: true
            features: "macros"
            display: wasm32-unknown-unknown
    name: Test on ${{ matrix.display }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - name: Setup `wasmtime`
        if: ${{ matrix.needs_wasmtime }}
        uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3

      - name: Get wasm-bindgen version
        if: ${{ matrix.needs_wasm_bindgen }}
        id: wasm-bindgen-version
        run: |
          VERSION=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name=="wasm-bindgen") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install wasm-bindgen
        if: ${{ matrix.needs_wasm_bindgen }}
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: 'wasm-bindgen@${{ steps.wasm-bindgen-version.outputs.version }}'

      - name: Run tests
        env:
          JSONSCHEMA_SUITE_DRAFT_FILTER: draft2020-12
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --target ${{ matrix.target }} --no-default-features --features "${{ matrix.features }}" -p jsonschema
          else
            cargo test --target ${{ matrix.target }} --no-default-features -p jsonschema
          fi

  check-wasm-compile-errors:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: wasm32-unknown-unknown
            feature: resolve-http
            pattern: "resolve-http.*resolve-file.*not supported.*wasm32-unknown-unknown"
          - target: wasm32-unknown-unknown
            feature: resolve-file
            pattern: "resolve-http.*resolve-file.*not supported.*wasm32-unknown-unknown"
    name: Check ${{ matrix.feature }} fails on ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ${{ matrix.target }}-${{ matrix.feature }}

      - name: Verify compile error
        run: |
          output=$(cargo check --target ${{ matrix.target }} --features ${{ matrix.feature }} -p jsonschema 2>&1 || true)
          echo "$output"
          if ! echo "$output" | grep -q "${{ matrix.pattern }}"; then
            echo "Expected compile error not found!"
            echo "Expected pattern: ${{ matrix.pattern }}"
            exit 1
          fi
          echo "✓ Correctly rejects ${{ matrix.feature }} on ${{ matrix.target }}"

  test-coverage:
    name: Test coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-llvm-cov

      - name: Run tests with all features
        run: |
          cargo llvm-cov --no-report --all-features --workspace \
            --exclude jsonschema-py \
            --exclude jsonschema-rb \
            --exclude benchmark \
            --exclude benchmark-suite \
            --exclude jsonschema-testsuite \
            --exclude jsonschema-testsuite-codegen \
            --exclude jsonschema-testsuite-internal \
            --exclude jsonschema-referencing-testsuite \
            --exclude jsonschema-referencing-testsuite-codegen \
            --exclude jsonschema-referencing-testsuite-internal \
            --exclude testsuite-common

      - name: Run tests without arbitrary-precision
        run: cargo llvm-cov --no-report -p jsonschema --features macros

      - name: Generate merged coverage report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: coverage
          files: lcov.info
          fail_ci_if_error: true

  test-miri:
    name: Test with Miri
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - name: Run tests with Miri
        run: cargo miri test -p referencing --lib

  lint-python:
    name: Lint Python
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uvx ruff check python tests-py
        working-directory: crates/jsonschema-py

      - run: uvx mypy python
        working-directory: crates/jsonschema-py

  test-python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy3.11']

    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uv python install ${{ matrix.python-version }}

      - run: uvx --with=".[tests]" --python='${{ matrix.python-version }}' pytest tests-py
        working-directory: crates/jsonschema-py

  test-python-freethreaded:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ['3.14t', '3.15t']

    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uv python install ${{ matrix.python-version }}

      - name: Find Python path (Windows)
        if: runner.os == 'Windows'
        id: python-path-windows
        shell: bash
        run: echo "path=$(uv python find ${{ matrix.python-version }})" >> "$GITHUB_OUTPUT"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --release -m crates/jsonschema-py/Cargo.toml --out crates/jsonschema-py/dist --interpreter ${{ steps.python-path-windows.outputs.path }}

      - name: Build wheel (Unix)
        if: runner.os != 'Windows'
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --release -m crates/jsonschema-py/Cargo.toml --out crates/jsonschema-py/dist --interpreter ${{ matrix.python-version }}

      - name: Test wheel
        shell: bash
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install crates/jsonschema-py/dist/*.whl
          uv run --with pytest --with hypothesis pytest crates/jsonschema-py/tests-py

  test-ruby:
    env:
      BUNDLE_WITHOUT: "lint:benchmark"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        ruby-version: ["3.2", "3.4", "4.0"]

    name: Test Ruby ${{ matrix.ruby-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ruby-${{ matrix.os }}

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: crates/jsonschema-rb

      - run: bundle exec rake compile
        env:
          RB_SYS_CARGO_PROFILE: dev
        working-directory: crates/jsonschema-rb

      - run: bundle exec rspec
        env:
          JSONSCHEMA_RB_LIFETIME_STRESS_ITERATIONS: "10"
          JSONSCHEMA_RB_LIFETIME_GC_ROUNDS: "3"
        working-directory: crates/jsonschema-rb

  test-ruby-gem-install:
    name: Ruby Gem Install ${{ matrix.ruby-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        ruby-version: ["3.2", "3.4", "4.0"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ruby-gem-install-${{ matrix.os }}

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Build gem
        run: gem build jsonschema.gemspec
        working-directory: crates/jsonschema-rb

      - name: Install rb_sys
        run: gem install rb_sys -v '~> 0.9' --no-document

      - name: Install gem
        run: |
          GEM_FILE=$(ls jsonschema_rs-*.gem | head -1)
          gem install "./$GEM_FILE" --local --no-document
        working-directory: crates/jsonschema-rb
        shell: bash

      - name: Smoke test
        run: |
          ruby -e "
            require 'jsonschema_rs'
            raise 'valid? failed' unless JSONSchema.valid?({'type' => 'string'}, 'hello')
            raise 'valid? false positive' if JSONSchema.valid?({'type' => 'string'}, 42)
            puts 'Gem installation OK'
          "

  test-ruby-gem-install-musl:
    name: Ruby Gem Install (Alpine/musl)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      # ECR Public rate-limits anonymous pulls per source IP, and shared
      # GitHub-runner IPs intermittently hit `toomanyrequests`. Retry the pull
      # with backoff so the run step below works from the local cache.
      - name: Pull Ruby Alpine image
        run: |
          image=public.ecr.aws/docker/library/ruby:3.4-alpine3.21
          for attempt in 1 2 3 4 5; do
            if docker pull "$image"; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "::warning::docker pull failed (attempt $attempt/5), retrying in ${delay}s"
            sleep "$delay"
          done
          echo "::error::docker pull failed after 5 attempts"
          exit 1

      - name: Test gem install on Alpine/musl
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            public.ecr.aws/docker/library/ruby:3.4-alpine3.21 \
            sh -c '
              set -e
              apk add --no-cache alpine-sdk curl gcompat clang clang-dev llvm-dev
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . ~/.cargo/env
              gem update --system
              cd crates/jsonschema-rb
              gem install rb_sys -v "~> 0.9" --no-document
              gem build jsonschema.gemspec
              gem install jsonschema_rs-*.gem --local --no-document
              ruby -e "require \"jsonschema_rs\"; raise unless JSONSchema.valid?({\"type\" => \"string\"}, \"hello\"); puts \"musl OK\""
            '

  lint-ruby:
    name: Lint Ruby
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      BUNDLE_WITHOUT: "development:test:benchmark"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: crates/jsonschema-rb

      - run: bundle exec rubocop
        working-directory: crates/jsonschema-rb

      - run: bundle exec rbs -I sig validate
        working-directory: crates/jsonschema-rb

  lint-fmt:
    name: Lint formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  lint-clippy:
    name: Lint Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo clippy --all-targets --features arbitrary-precision -p jsonschema -- -D warnings
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: profiler
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: fuzz

  lint-clippy-wasm:
    strategy:
      fail-fast: false
      matrix:
        target: [wasm32-unknown-unknown, wasm32-wasip1]
    name: Lint Clippy on ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          key: ${{ matrix.target }}

      - run: cargo clippy --target ${{ matrix.target }} --all-targets --no-default-features -p jsonschema -- -D warnings
      - run: cargo clippy --target ${{ matrix.target }} --all-targets --no-default-features -p referencing -- -D warnings

  test-wasm-bindgen:
    name: Test jsonschema-wasm (wasm-bindgen)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: wasm-pack

      - run: wasm-pack test --headless --firefox crates/jsonschema-wasm

  check-release-rust:
    name: Check Rust release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      # One invocation: separate dry-runs would need every dependency version already on crates.io.
      - run: cargo publish --dry-run -p referencing -p jsonschema-value -p jsonschema-regex -p jsonschema-macros-core -p jsonschema-macros -p jsonschema -p jsonschema-cli

  check-release-python:
    name: Check Python release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uv python install "3.12"

      - run: uv build --sdist --wheel --out-dir dist
        working-directory: crates/jsonschema-py

      - run: uv venv
        working-directory: crates/jsonschema-py

      - name: Install sdist
        run: |
          uv pip install dist/*.tar.gz --force-reinstall
        working-directory: crates/jsonschema-py

      - name: Install wheel
        run: |
          uv pip install dist/*.whl --force-reinstall
        working-directory: crates/jsonschema-py

  check-release-python-freethreaded:
    name: Check Python release (free-threaded)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.14t", "3.15t"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uv python install ${{ matrix.python_version }}

      - name: Build wheel
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --release -m crates/jsonschema-py/Cargo.toml --out crates/jsonschema-py/dist --interpreter ${{ matrix.python_version }}

      - name: Install and verify wheel
        run: |
          uv venv --python ${{ matrix.python_version }}
          uv pip install crates/jsonschema-py/dist/*.whl
          uv run python -c "import jsonschema_rs; assert jsonschema_rs.is_valid({'type': 'string'}, 'foo')"

  check-features:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: native
            flags: "--feature-powerset --exclude-features resolve-http"
          - target: wasm32-unknown-unknown
            name: wasm32-unknown-unknown
            flags: "--feature-powerset --exclude-features default,resolve-http,resolve-file,resolve-async,retrieve-async,pyo3"
          - target: wasm32-wasip1
            name: wasm32-wasip1
            flags: "--feature-powerset --exclude-features retrieve-async,pyo3"
    name: Check features on ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-hack

      - name: Check features for jsonschema
        run: cargo hack check --target ${{ matrix.target }} ${{ matrix.flags }} -p jsonschema

      - name: Check features for referencing
        run: cargo hack check --target ${{ matrix.target }} ${{ matrix.flags }} -p referencing

  fuzz:
    strategy:
      fail-fast: false
      matrix:
        target: ["builder", "validation", "referencing", "codegen"]
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - run: cargo install cargo-fuzz --force

      - run: cargo +nightly fuzz run --release ${{ matrix.target }} fuzz/seeds -- -dict=fuzz/dict -max_total_time=60

  test-python-musllinux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            arch: amd64
          - target: aarch64
            arch: aarch64
    name: Test Python musllinux on ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.10'

      - name: Build wheel
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: -m crates/jsonschema-py/Cargo.toml --out dist

      - uses: uraimo/run-on-arch-action@f9b26e3a1a408d5fd530d20c17b9f3f4428ff8d9 # v3.1.0
        name: Install and test wheel on Alpine
        with:
          base_image: '--platform=linux/${{ matrix.arch }} python:3.10-alpine'
          githubToken: ${{ github.token }}
          shell: /bin/sh
          install: apk add --no-cache py3-pip
          run: |
            pip install dist/*.whl --break-system-packages
            python -c "import jsonschema_rs; assert jsonschema_rs.is_valid({'type': 'string'}, 'foo')"

  lint-docs:
    name: Lint documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"

      - run: cargo doc --workspace --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  lint-spelling:
    name: Lint spelling
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
