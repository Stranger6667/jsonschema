name: Ruby Release

on:
  push:
    tags:
      - ruby-v*
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-24.04
    outputs:
      supported-ruby-platforms: ${{ steps.parse.outputs.supported-ruby-platforms }}
      stable-ruby-versions: ${{ steps.parse.outputs.stable-ruby-versions }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
        with:
          supported-ruby-platforms: |
            exclude:
              - arm-linux
              - x64-mingw32
              - aarch64-mingw-ucrt
          stable-ruby-versions: |
            exclude:
              - head
      - id: parse
        run: |
          echo "supported-ruby-platforms=$(echo '${{ steps.fetch.outputs.result }}' | jq -c '."supported-ruby-platforms"')" >> "$GITHUB_OUTPUT"
          echo "stable-ruby-versions=$(echo '${{ steps.fetch.outputs.result }}' | jq -r '."stable-ruby-versions" | join(",")')" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    needs: ci-data
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.supported-ruby-platforms) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: "3.4"

      - name: Expose Gemfile.lock for rb-sys-dock version detection
        run: cp crates/jsonschema-rb/Gemfile.lock Gemfile.lock

      - uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ needs.ci-data.outputs.stable-ruby-versions }}
          working-directory: crates/jsonschema-rb

      - name: Smoke test (x86_64-linux only)
        if: matrix.platform == 'x86_64-linux'
        run: |
          gem install pkg/*.gem --local
          ruby -e "require 'jsonschema_rs'; raise 'validation failed' unless JSONSchema.valid?({'type'=>'string'}, 'hello'); puts 'smoke test OK'"
        working-directory: crates/jsonschema-rb

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gem-${{ matrix.platform }}
          path: crates/jsonschema-rb/pkg/*.gem
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gem-*

      - name: Build source gem
        run: gem build jsonschema.gemspec
        working-directory: crates/jsonschema-rb

      - name: Collect all gems
        run: |
          mkdir -p pkg
          mv artifacts/**/*.gem pkg/
          mv crates/jsonschema-rb/jsonschema_rs-*.gem pkg/

      - name: Push to RubyGems
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: ${RUBYGEMS_API_KEY}" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          for gem in pkg/*.gem; do
            echo "Pushing ${gem}..."
            gem push "${gem}"
          done

      - name: Extract Version
        run: echo "version=${GITHUB_REF#refs/tags/ruby-v}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: pkg/*.gem
          make_latest: false
          draft: true
          name: "[Ruby] Release ${{ env.version }}"
